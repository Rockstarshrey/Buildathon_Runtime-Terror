kind = "web"
previewPath = "/"
title = "KisanConnect"
version = "1.0.0"
id = "artifacts/kisan-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26219

[services.development]
run = "pnpm --filter @workspace/kisan-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kisan-connect", "run", "build" ]
publicDir = "artifacts/kisan-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26219"
BASE_PATH = "/"
